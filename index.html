<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity Effect - Gravity.js</title>
    <!-- Import Gravity JS script -->
    <script src="https://gravity-js.vercel.app/gravity.js" defer></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
            position: relative;
            background-color: #f8f9fa;
        }

        .random-element {
            position: absolute;
            padding: 12px 24px;
            font-size: 18px;
            background-color: rgba(0, 123, 255, 0.7);
            border: 2px solid rgba(0, 123, 255, 1);
            border-radius: 8px;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transform: rotate(0deg);
            opacity: 0.9;
            pointer-events: none;
            user-select: none;
            opacity: 0; /* Initially hidden */
        }

        h1 {
            text-align: center;
            margin-top: 20px;
            color: #343a40;
        }
    </style>
</head>
<body>

    <h1>Welcome to the Gravity.js Effect Demo</h1>

    <script>
        // Array of messages about gravity.js
        const gravityMessages = [
            "Gravity.js adds a fun effect to your site with falling elements!",
            "It uses random placement for elements that fall and bounce!",
            "The gravity effect is based on Matter.js physics engine.",
            "To use gravity.js, simply include it and watch the magic happen!",
            "Random elements appear and fall as if they have weight and physics!",
            "Gravity.js is perfect for adding interactive, dynamic elements to your site!"
        ];

        // Function to generate messages one by one with delay
        let messageIndex = 0;

        const generateMessage = () => {
            if (messageIndex < gravityMessages.length) {
                const message = gravityMessages[messageIndex];
                
                // Create a new div element for each message
                const messageElement = document.createElement('div');
                messageElement.classList.add('random-element');  // Apply the styles for the falling elements
                messageElement.textContent = message;

                // Random position and rotation for each message
                const randomX = Math.random() * window.innerWidth;
                const randomY = Math.random() * window.innerHeight;
                const randomRotation = (Math.random() - 0.5) * 30;  // Random tilt between -15 and 15 degrees

                // Apply the random styles
                messageElement.style.left = `${randomX}px`;
                messageElement.style.top = `${randomY}px`;
                messageElement.style.transform = `rotate(${randomRotation}deg)`;

                // Append the element to the body
                document.body.appendChild(messageElement);

                // Show the message with a delay
                setTimeout(() => {
                    messageElement.style.opacity = 1;  // Fade in the message
                }, 100);

                messageIndex++;

                // Wait for a short delay before generating the next message
                setTimeout(generateMessage, 1000);
            }
        };

        // Start generating messages when the page loads
        window.onload = generateMessage;
    </script>

</body>
</html>
