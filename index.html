<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Falling Elements</title>
    <!-- Importing external CSS for styling -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Reset CSS for body and html */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%; /* Full height to allow scrolling */
            width: 100%;
            font-family: 'Roboto', sans-serif;
            overflow: hidden; /* Prevent scrolling for smoother random element movement */
            position: relative; /* Ensure the body is the container for absolutely positioned elements */
            background-color: #f8f9fa; /* Light background color for the page */
        }

        /* Styling for the random elements */
        .random-element {
            position: absolute;
            padding: 12px 24px;
            font-size: 18px;
            background-color: rgba(0, 123, 255, 0.7);
            border: 2px solid rgba(0, 123, 255, 1);
            border-radius: 8px;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transform: rotate(0deg); /* Initial rotation, will be randomized */
            opacity: 0.9; /* Slightly transparent for better layering */
            pointer-events: none; /* So they don’t interfere with other interactions */
            user-select: none; /* Prevent text selection */
        }

        /* Styling for the title at the top */
        h1 {
            text-align: center;
            margin-top: 20px;
            color: #343a40; /* Dark text for the title */
        }

    </style>
</head>
<body>

    <!-- Title -->
    <h1>Welcome to Random Gravity Test</h1>

    <!-- External JS Script to handle the falling elements -->
    <script src="./js/gravity.js"></script>
    <script>
        // Function to generate random elements
        function generateRandomElements(numElements) {
            for (let i = 0; i < numElements; i++) {
                const randomElement = document.createElement('div');
                randomElement.classList.add('random-element');
                randomElement.textContent = `Random Element ${i + 1}`;

                // Random position on the page
                const randomX = Math.random() * window.innerWidth;
                const randomY = Math.random() * window.innerHeight;

                // Apply random styles
                randomElement.style.left = `${randomX}px`;
                randomElement.style.top = `${randomY}px`;
                randomElement.style.transform = `rotate(${Math.random() * 360}deg)`; // Random rotation

                // Append to body
                document.body.appendChild(randomElement);
            }
        }

        // Generate 30 random elements when the page loads
        window.onload = () => generateRandomElements(30);
    </script>
</body>
</html>
