<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity.js</title>
    <script src="./gravity.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet"> <!-- Added Roboto Font -->
    <style>
        /* Basic reset for body and html */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%; /* Allow full height for scrolling */
            width: 100%;
            background-color: #f4f7fc; /* Subtle light background */
            font-family: 'Roboto', sans-serif; /* Use Roboto font */
            display: flex;
            justify-content: center;
            align-items: center; /* Center all content */
            overflow: auto; /* Allow scrolling */
        }

        /* Container to hold the falling elements */
        .container {
            position: relative; /* Allows elements inside to be positioned absolutely */
            width: 90%; /* Responsive width */
            max-width: 800px; /* Maximum width */
            height: 100%; /* Takes up full height of the page */
            text-align: center;
        }

        /* Styles for the elements that will fall with gravity */
        .element-to-apply-gravity {
            position: absolute; /* Position dynamically */
            left: 50%; /* Center the elements horizontally */
            transform: translateX(-50%); /* Perfect centering */
            will-change: transform; /* Optimizes rendering during animation */
            background-color: rgba(0, 123, 255, 0.6); /* Light blue background */
            border: 2px solid rgba(0, 123, 255, 1); /* Border for visibility */
            padding: 12px 24px; /* Adds padding for better readability */
            font-size: 18px; /* Slightly larger text */
            border-radius: 8px; /* Rounded corners for better aesthetics */
            color: white; /* Text color */
            font-weight: bold; /* Make text bold */
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); /* Soft shadow */
            transition: transform 0.5s ease-out; /* Smooth transition for gravity effect */
            opacity: 0; /* Initially set opacity to 0 */
        }

        /* Styling for the title */
        h1 {
            font-size: 32px;
            font-weight: bold;
            color: #333; /* Darker text for better contrast */
            margin-bottom: 20px;
        }

        /* Styling for the description */
        p {
            font-size: 18px;
            color: #666; /* Lighter text for secondary content */
            margin-bottom: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to Gravity.js!</h1>
        <p>Watch the messages about <strong>gravity.js</strong> fall down and bounce when you visit the page!</p>
    </div>

    <script>
        // Messages about gravity.js that will fall
        const messages = [
            "gravity.js is a simple library for adding gravity effects to web elements.",
            "It uses Matter.js internally for physics simulation.",
            "With gravity.js, you can make any DOM element fall and interact with the page.",
            "Perfect for creating fun and interactive animations on your website.",
            "To start, simply include the library and add a class to elements you want to fall.",
            "Try it out and see the effect immediately when the page loads!"
        ];

        // Function to create and make messages fall
        function triggerGravityEffect() {
            messages.forEach(message => {
                const element = document.createElement('div');
                element.className = 'element-to-apply-gravity';
                element.textContent = message;
                document.querySelector('.container').appendChild(element);

                // Randomly position each message on the page
                const randomTop = Math.random() * 100 + 'vh'; // Random position from 0 to 100% of the viewport height
                const randomLeft = Math.random() * 100 + 'vw'; // Random position from 0 to 100% of the viewport width
                element.style.top = randomTop;
                element.style.left = randomLeft;

                // Make each message visible immediately and fall
                setTimeout(() => {
                    element.style.opacity = 1; // Fade the message in
                    element.style.transition = 'transform 0.5s ease-out'; // Allow gravity to take effect after fade-in
                }, 0);
            });
        }

        // Automatically trigger gravity effect when the page loads
        window.addEventListener('load', triggerGravityEffect);
    </script>
</body>
</html>
